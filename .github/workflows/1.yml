name: Sync Releases

on:
  schedule:
    - cron: '5 0 * * *'
  workflow_dispatch:

jobs:
  sync-releases:
    runs-on: ubuntu-latest
    steps:
      - name: Sync releases
        run: |
          # иЋ·еЏ–жєђд»“еє“ releases
          releases=$(curl -s -H "Authorization: token $GITHUB_TOKEN" \
            "https://api.github.com/repos/2dust/v2rayNG/releases")

          # иЋ·еЏ–з›®ж ‡д»“еє“е·Іжњ‰ releases
          existing=$(curl -s -H "Authorization: token $GITHUB_TOKEN" \
            "https://api.github.com/repos/cor233/v2rayNG/releases")

          echo "$releases" | jq -c '.[]' | while read -r release; do
            tag_name=$(echo "$release" | jq -r '.tag_name')
            if echo "$existing" | jq -e --arg tag "$tag_name" '.[] | select(.tag_name == $tag)' > /dev/null; then
              echo "Release $tag_name already exists, skipping."
              continue
            fi

            name=$(echo "$release" | jq -r '.name')
            body=$(echo "$release" | jq -r '.body')
            prerelease=$(echo "$release" | jq -r '.prerelease')
            draft=$(echo "$release" | jq -r '.draft')

            response=$(curl -s -X POST -H "Authorization: token $GITHUB_TOKEN" \
              -H "Content-Type: application/json" \
              -d "{
                \"tag_name\": \"$tag_name\",
                \"name\": \"$name\",
                \"body\": \"$body\",
                \"prerelease\": $prerelease,
                \"draft\": $draft
              }" \
              "https://api.github.com/repos/cor233/v2rayNG/releases")

            upload_url=$(echo "$response" | jq -r '.upload_url' | sed 's/{?name,label}//')

            echo "$release" | jq -c '.assets[]' | while read -r asset; do
              asset_name=$(echo "$asset" | jq -r '.name')
              asset_url=$(echo "$asset" | jq -r '.browser_download_url')
              echo "Downloading $asset_name..."
              curl -sL -o "$asset_name" "$asset_url"
              echo "Uploading $asset_name..."
              curl -s -X POST -H "Authorization: token $GITHUB_TOKEN" \
                -H "Content-Type: application/octet-stream" \
                --data-binary "@$asset_name" \
                "$upload_url?name=$asset_name"
              rm "$asset_name"
            done
          done
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
